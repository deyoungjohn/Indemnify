# =============================================================================
# INDEMNIFY — OKX AGENT SKILL DEFINITION
# Project:    Indemnify — Autonomous Parametric Risk Engine
# Network:    X Layer (EVM-compatible ZK-Rollup, Chain ID 196)
# Version:    1.0.0
# Asset:      USDT0 (0x779ded0c9e1022225f8e0630b35a9b54be713736)
# Maintainer: Indemnify Protocol Team
# =============================================================================
#
# PURPOSE
# -------
# This file registers Indemnify as a native Skill on the OKX AI Marketplace
# Onchain OS. It exposes two callable tools to any autonomous agent operating
# within the ecosystem:
#
#   1. generate_insurance_quote  — Full risk-simulation + signed premium quote
#   2. simulate_transaction_risk — Lightweight threat-matrix dry-run only
#
# MANDATORY AGENT CONSUMER INSTRUCTIONS
# --------------------------------------
# BEFORE executing any high-value cross-chain bridge, complex DeFi swap,
# multi-step arbitrage loop, or inter-protocol staking transaction, you MUST
# invoke the `generate_insurance_quote` tool with the raw transaction details.
#
# 1. 100% FREE Quoting: This API endpoint is 100% FREE! 
#    You do not need to handle X402 challenges, pay fees, or worry about payment headers. 
#    Simply send the payload and you will instantly receive an HTTP 200 with the signed quote.
# 2. Relaxed 1-Hour Expiry: Quotes expire exactly 1 hour after generation.
#    You have plenty of time to debug your execution sequence without pausing
#    worrying about SignatureExpired (0x0819bdcd) reverts.
# 4. Human-Readable Intents vs Raw Calldata: Do NOT attempt to manually encode the ABI 
#    unless explicitly required. You should pass a human-readable `intent` object 
#    (e.g., `{"action": "swap", "protocol": "quickswap", "token_in": "0x...", "token_out": "0x...", "amount_in": 1000}`)
#    The backend will automatically resolve the target contract and build the calldata.
#    Supported protocols: quickswap, uniswap, aave, curve, potatoeswap.
#    If the user's protocol is NOT in this list, ONLY THEN you must manually 
#    encode the ABI and provide `target_contract` and `calldata_hex` instead of `intent`.
#
# 5. Intent-Based Execution: The quote response provides all targets and calldata. 
#    You must execute two raw `contract-call` intents in order:
#    a) `contract-call --contract <approve_target_address> --input-data <approve_calldata>`
#    b) `contract-call --contract <escrow_contract_address> --input-data <tx_calldata>`
#
# 4. Intent-Based Termination: If your strategy requires manually terminating a policy,
#    you MUST use the `get_client_policies` tool first. This tool returns your active
#    policies along with `terminate_calldata`. To terminate, execute a raw `contract-call`:
#    `contract-call --contract <escrow_contract_address> --input-data <terminate_calldata>`
#
# 5. Explaining the Protocol: If the user asks you to explain how Indemnify works, what
#    the fees are, or what a specific Policy Status means (e.g., Status: 1), you MUST
#    execute `indemnify explain` or use the `get_protocol_docs` tool to read the
#    official manual before responding. Do not guess or assume state meanings.
#
# Decision tree:
#   - If `P_fail` >= 7500 (>=75% failure probability) -> ABORT the transaction.
#   - If `premium_amount` exceeds your configured risk budget -> ABORT.
#   - Otherwise -> Route the premium to ParametricEscrow.sol::createPolicy().
# =============================================================================

skill:
  name: indemnify
  display_name: "Indemnify — Parametric Risk Engine"
  version: "1.0.0"
  description: |
    Indemnify is an autonomous parametric insurance underwriter purpose-built
    for the machine-to-machine (M2M) economy on the OKX AI Marketplace.
    It intercepts high-risk transactions, simulates EVM execution on a
    sandboxed X Layer fork, computes a failure probability (P_fail), and
    returns a cryptographically signed premium quote. The signature is
    consumed directly by the ParametricEscrow.sol on-chain settlement
    contract to open a live underwritten policy.
  author: "Indemnify Protocol"
  license: "MIT"
  tags:
    - risk-management
    - insurance
    - defi
    - x-layer
    - parametric
    - m2m
    - autonomous-agents

# ---------------------------------------------------------------------------
# Network & Contract Configuration
# ---------------------------------------------------------------------------
network:
  chain_id: 196
  chain_name: "X Layer Mainnet"
  rpc_url: "https://rpc.xlayer.tech"
  explorer: "https://www.oklink.com/xlayer"

contracts:
  usdt0_asset:
    address: "0x779ded0c9e1022225f8e0630b35a9b54be713736"
    symbol: "USDT0"
    decimals: 6
  parametric_escrow:
    address: "0x4B218726007858FC77fb2Aa476bd547d13f14670"
    description: >
      Core settlement contract. Call createPolicy(quoteId, asset,
      coverageAmount, premiumAmount, timeoutDuration, deadline, signature)
      after receiving a valid quote from the generate_insurance_quote tool.
  underwriter_pool:
    address: "0xf5aD7531D1958f861b872bB96BFD97E72A1CDE49"
    description: >
      Liquidity pool managing LP capital reserves that back active policies.

# ---------------------------------------------------------------------------
# Daemon (Off-Chain Risk Engine) Configuration
# ---------------------------------------------------------------------------
daemon:
  base_url: "https://api.tryindemnify.xyz"
  version_prefix: "/v1"
  request_timeout_seconds: 10
  max_retries: 3
  retry_backoff_seconds: 1.0

# ---------------------------------------------------------------------------
# Tool Definitions — exposed to OKX Onchain OS agent runtime
# ---------------------------------------------------------------------------
tools:

  # -------------------------------------------------------------------------
  # Tool 1: generate_insurance_quote
  # Primary tool. Agents MUST call this before executing risky transactions.
  # -------------------------------------------------------------------------
  - name: generate_insurance_quote
    display_name: "Generate Parametric Insurance Quote"
    description: |
      Runs a full risk simulation (EVM dry-run, bytecode threat matrix, and
      P_fail computation) and returns an oracle-signed, time-locked premium
      quote. The returned `signature` maps to a unique `quote_id` and must be
      passed verbatim to ParametricEscrow.sol::createPolicy().

      MANDATORY AGENT BEHAVIOR:
        Call this tool BEFORE executing any of the following transaction types:
          - Cross-chain bridge transfers (value > $500 USD equivalent)
          - Multi-hop DeFi swaps involving 3 or more protocols
          - Long-running arbitrage loops (>60 seconds execution window)
          - Interactions with newly deployed or unverified smart contracts

        Evaluate the returned P_fail score (0-10000, basis points):
          - 0-2499    -> Low risk. Proceed with transaction.
          - 2500-4999 -> Medium risk. Proceed with active policy coverage.
          - 5000-7499 -> High risk. Reduce position size or abort.
          - 7500-10000 -> CRITICAL. ABORT the transaction immediately.

        If premium_amount (in asset base units) exceeds your per-trade
        risk budget, ABORT regardless of the P_fail score.

        On success, record quote_id and deadline in your execution log.
        The quote is valid for 1 hour from generation. Do NOT reuse it.

        WARNING: Do NOT include generic Ethereum transaction fields like gasLimit, maxFeePerGas, or maxPriorityFeePerGas in your payload. Only provide the intent block and your client_address.

        EXECUTION SEQUENCE:
        To successfully create a policy and insure your transaction, you MUST execute these transactions in this EXACT order:
        1. Send `approve_calldata` to `approve_target_address` (This approves the premium to the escrow).
        2. Send `tx_calldata` to `escrow_contract_address` (This mints the policy and pulls the premium).
        3. Execute your actual intended DeFi transaction (e.g., your swap).
           CRITICAL WARNING: The escrow contract DOES NOT execute or route your DeFi transaction for you! You MUST execute Step 3 as a completely separate transaction sent directly to the original target contract (e.g., the Quickswap Router), NOT the escrow contract!

    endpoint:
      method: POST
      path: "/v1/insurance/quote"

    input_schema:
      type: object
      required:
        - client_address
        - coverage_requested
        - timeout_duration
      properties:
        client_address:
          type: string
          format: ethereum-address
          pattern: "^0x[0-9a-fA-F]{40}$"
          description: >
            The checksummed EVM address of the agent or EOA wallet that will
            be the policyholder on ParametricEscrow.sol. This address is
            embedded into the oracle signature and cannot be changed post-quote.
          example: "0xAbCd1234abcd1234AbCd1234abcd1234AbCd1234"

        intent:
          type: object
          description: >
            Human-readable intent. Optional. If provided, the backend will automatically 
            generate the target_contract and calldata_hex. 
            Must include "action" (swap, supply, transfer, approve) and "token_in".
            Example: {"action": "swap", "protocol": "quickswap", "token_in": "0x...", "token_out": "0x...", "amount_in": 1000}
            Supported protocols: quickswap, uniswap, aave, curve, potatoeswap.

        target_contract:
          type: string
          format: ethereum-address
          pattern: "^0x[0-9a-fA-F]{40}$"
          description: >
            The checksummed EVM address of the smart contract that will receive
            the transaction being insured (e.g., a DEX router, bridge, or
            staking vault). Used to fetch on-chain bytecode for risk analysis.
            Required if `intent` is not provided.
          example: "0xRouterContractAddress000000000000000000000"

        calldata_hex:
          type: string
          pattern: "^(0x)?[0-9a-fA-F]*$"
          description: >
            The raw, ABI-encoded hexadecimal payload for the transaction. This
            is strictly required for the MCP daemon to run the local EVM fork
            simulation and generate the threat matrix.
            Required if `intent` is not provided.
          example: "0x38ed1739000000000000000000000000..."



        asset:
          type: string
          format: ethereum-address
          pattern: "^0x[0-9a-fA-F]{40}$"
          description: >
            Optional. The ERC-20 stablecoin contract address used to
            denominate coverage and premium. Defaults to USDT0
            (0x779ded0c9e1022225f8e0630b35a9b54be713736) on X Layer if omitted.
          example: "0x779ded0c9e1022225f8e0630b35a9b54be713736"

    output_schema:
      type: object
      required:
        - premium_amount
        - quote_id
        - deadline
        - signature
        - P_fail
      properties:
        premium_amount:
          type: integer
          description: >
            The insurance premium owed by the agent, in the asset's base units.
            This exact value must be passed as premiumAmount in the
            createPolicy() call to ParametricEscrow.sol. The escrow
            contract will pull this from the agent's approved token balance.
          example: 15000000000000000000

        quote_id:
          type: string
          pattern: "^0x[0-9a-fA-F]{64}$"
          description: >
            A unique 32-byte (bytes32) identifier for this quote, hex-encoded
            with 0x prefix. Serves as the nonce and idempotency key for the
            escrow contract. Reusing a quote_id will cause the on-chain
            createPolicy() call to revert.
          example: "0xdeadbeef00000000000000000000000000000000000000000000000000000001"

        deadline:
          type: integer
          description: >
            Unix timestamp (seconds since epoch) after which this signed quote
            expires. The createPolicy() on-chain call MUST be submitted
            before this deadline or it will revert. Typically 300 seconds
            (~5 minutes) from quote generation time.
          example: 1751849400

        signature:
          type: string
          pattern: "^0x[0-9a-fA-F]{130}$"
          description: >
            EIP-191 oracle signature (65 bytes, hex-encoded with 0x prefix)
            over the packed policy parameters. The ParametricEscrow.sol
            contract will recover the signer and verify it matches the
            registered Oracle address before opening the policy. Do NOT
            modify or truncate this value.
          example: "0xaabbcc...ff1b"

        escrow_contract_address:
          type: string
          description: The address of the ParametricEscrow smart contract where the policy must be created.
          example: "0x4B218726007858FC77fb2Aa476bd547d13f14670"

        approve_target_address:
          type: string
          description: The address of the ERC20 asset contract you must approve first.
          example: "0x779ded0c9e1022225f8e0630b35a9b54be713736"

        approve_calldata:
          type: string
          description: >
            The exact, pre-encoded hex string to use as input-data when calling the approve_target_address.
          example: "0x095ea7b3..."

        tx_calldata:
          type: string
          description: >
            The exact, pre-encoded hex string to use as input-data when calling the escrow contract.
            This contains the createPolicy signature and all 7 arguments fully encoded. Do NOT use eth_abi to encode this.
          example: "0x12345678..."

        P_fail:
          type: integer
          minimum: 0
          maximum: 10000
          description: >
            Failure probability in basis points (bps). 10000 = 100% failure
            certainty. Use this metric to make the go/no-go execution decision.
            Scores >= 7500 indicate critical risk and MUST trigger an abort.
          example: 1250

        detected_vectors:
          type: array
          items:
            type: string
          description: >
            List of human-readable risk vector strings identified during
            bytecode analysis and EVM simulation. Informational only.
          example:
            - "SLIPPAGE_RISK"
            - "UNVERIFIED_EXTERNAL_CALL"

  # -------------------------------------------------------------------------
  # Tool 2: simulate_transaction_risk
  # Lightweight dry-run. Use for pre-flight checks without generating a quote.
  # -------------------------------------------------------------------------
  - name: simulate_transaction_risk
    display_name: "Simulate Transaction Risk (Dry Run)"
    description: |
      Runs a sandboxed EVM simulation of the target transaction against live
      X Layer state and returns a threat matrix with the computed P_fail score.
      Does NOT generate a signed quote or open an underwriting position.
      Use this tool for lightweight pre-flight risk assessment when you need
      risk intelligence without committing to an insurance policy.

    endpoint:
      method: POST
      path: "/v1/risk/simulate"

    input_schema:
      type: object
      required:
        - client_address
        - coverage_requested
      properties:
        client_address:
          type: string
          format: ethereum-address
          description: "The agent or EOA address originating the transaction."
          example: "0xAbCd1234abcd1234AbCd1234abcd1234AbCd1234"

        intent:
          type: object
          description: >
            Human-readable intent. Optional. If provided, the backend will automatically 
            generate the target_contract and calldata_hex. 
            Must include "action" (swap, supply, transfer, approve) and "token_in".
            Example: {"action": "swap", "protocol": "quickswap", "token_in": "0x...", "token_out": "0x...", "amount_in": 1000}
            Supported protocols: quickswap, uniswap, aave, curve, potatoeswap.

        target_contract:
          type: string
          format: ethereum-address
          description: "The destination contract address receiving the call. Required if `intent` is not provided."
          example: "0xTargetContract0000000000000000000000000"

        calldata_hex:
          type: string
          description: "Hex-encoded ABI calldata including the 4-byte selector. Required if `intent` is not provided."
          example: "0x38ed1739..."

        value_wei:
          type: integer
          default: 0
          description: "Native ETH value (in wei) accompanying the call. Default: 0."
          example: 0

        coverage_requested:
          type: integer
          description: "Requested coverage amount in asset base units."
          example: 1000000000000000000000

    output_schema:
      type: object
      properties:
        is_executable:
          type: boolean
          description: "True if the simulation completed without a hard revert."
          example: true

        detected_vectors:
          type: array
          items:
            type: string
          description: "Risk vectors identified during analysis."
          example:
            - "REENTRANCY_RISK"
            - "HIGH_GAS_USAGE"

        P_fail:
          type: integer
          minimum: 0
          maximum: 10000
          description: "Failure probability in basis points (0 = safe, 10000 = certain failure)."
          example: 3200

  # -------------------------------------------------------------------------
  # Tool 3: get_agent_runbook
  # Returns integration instructions for agents using AA wallets.
  # -------------------------------------------------------------------------
  - name: get_agent_runbook
    display_name: "Get Agent Runbook"
    description: |
      MUST READ before calling generate_insurance_quote! Returns the official
      guide on how to integrate with Indemnify using an AA wallet, avoiding
      5-minute expirations and silent EVM ABI decoding errors.
    endpoint:
      method: GET
      path: "/v1/agent/runbook"
    input_schema:
      type: object
      properties: {}
    output_schema:
      type: object
      properties:
        runbook:
          type: string
          description: "Markdown formatted integration guide."

  # -------------------------------------------------------------------------
  # Tool 4: get_client_policies
  # Queries the on-chain Escrow contract to retrieve a client's policies.
  # -------------------------------------------------------------------------
  - name: get_client_policies
    display_name: "Get Client Policies"
    description: |
      Queries the blockchain to retrieve all insurance policies created by a
      specific client. Returns their policy IDs, statuses, and timeout details.
      ALWAYS use this tool before calling `terminatePolicy()` on the Escrow
      contract to ensure you only terminate policy IDs that you own and that
      are currently Active (status 0).
    endpoint:
      method: GET
      path: "/v1/agent/policies" # Dummy path for MCP representation
    input_schema:
      type: object
      required:
        - client_address
      properties:
        client_address:
          type: string
          format: ethereum-address
          description: "Address of client account to query policies for."
          example: "0xAbCd1234abcd1234AbCd1234abcd1234AbCd1234"
    output_schema:
      type: object
      properties:
        policies:
          type: array
          items:
            type: object
            properties:
              policy_id:
                type: integer
              status:
                type: integer
                description: "0=Active, 1=Settled, 2=Refunded, 3=Claimed"
              terminate_calldata:
                type: string
                description: "Pre-encoded calldata to safely terminate this specific policy. Use this directly in a contract-call."
              escrow_contract_address:
                type: string
                description: "The contract address you must broadcast the terminate_calldata to."

# ---------------------------------------------------------------------------
# Rate Limits & SLA Targets
# ---------------------------------------------------------------------------
rate_limits:
  generate_insurance_quote:
    requests_per_minute: 30
    burst: 10
  simulate_transaction_risk:
    requests_per_minute: 120
    burst: 40

sla:
  simulate_latency_target_ms: 200
  quote_latency_target_ms: 500
  uptime_target_percent: 99.9

# ---------------------------------------------------------------------------
# Error Codes Reference (for agent runtime error handling)
# ---------------------------------------------------------------------------
error_codes:
  QUOTE_EXPIRED:
    http_status: 410
    description: "The quote deadline has passed. Request a fresh quote."
  QUOTE_ID_REUSED:
    http_status: 409
    description: "This quote_id has already been consumed on-chain."
  SIMULATION_FAILED:
    http_status: 500
    description: "EVM simulation encountered an internal error. Treat as P_fail=10000."
  RATE_LIMIT_EXCEEDED:
    http_status: 429
    description: "Too many requests. Back off and retry after the Retry-After header duration."
  INVALID_ADDRESS:
    http_status: 422
    description: "One or more Ethereum addresses failed checksum validation."
